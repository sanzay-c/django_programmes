{% extends "base.html" %}
{% block title %}Add Recipe{% endblock title %}
{% block start %}

<style>
    body {
        background-color: #fdfdfd;
        font-family: 'Roboto', sans-serif;
    }

    /* Glassmorphism Effect */
    .form-card {
        background: white;
        border-radius: 20px;
        border: none;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
    }

    .form-header {
        background: linear-gradient(135deg, #FE724C 0%, #ff8c6b 100%);
        padding: 30px;
        text-align: center;
        color: white;
    }

    .form-label {
        font-weight: 600;
        color: #444;
        margin-bottom: 8px;
        font-size: 0.9rem;
    }

    .form-control, .form-select {
        border-radius: 10px;
        border: 1px solid #eee;
        padding: 12px 15px;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #FE724C;
        box-shadow: 0 0 0 0.25rem rgba(254, 114, 76, 0.1);
    }

    .btn-primary-custom {
        background-color: #FE724C;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .btn-primary-custom:hover {
        background-color: #e05632;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(254, 114, 76, 0.3);
        color: white;
    }

    .btn-outline-custom {
        border: 2px solid #FE724C;
        color: #FE724C;
        border-radius: 12px;
        padding: 10px;
        font-weight: bold;
        transition: all 0.3s ease;
        text-decoration: none;
        display: block;
        text-align: center;
    }

    .btn-outline-custom:hover {
        background-color: #FE724C;
        color: white;
    }

    /* Custom File Input */
    input[type="file"]::file-selector-button {
        background-color: #FE724C;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 5px 10px;
        margin-right: 10px;
        cursor: pointer;
    }
</style>

<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="form-card shadow-lg">
                <div class="form-header">
                    <h2 class="mb-1" style="font-weight: 800; letter-spacing: -0.5px;">Add New Recipe</h2>
                    <p class="mb-0 opacity-75">Share your culinary magic with the world</p>
                </div>

                <div class="p-4 p-md-5">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="recipe_name" class="form-label">Recipe Name</label>
                                    <input name="recipe_name" type="text" class="form-control" placeholder="e.g. Spicy Ramen" required>
                                </div>

                                <div class="mb-3">
                                    <label for="category" class="form-label">Category</label>
                                    <select name="category" class="form-select" required>
                                        <option value="" disabled selected>Choose a category</option>
                                        {% for value, label in CATEGORY_CHOICES %}
                                        <option value="{{ value }}">{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="cooking_time" class="form-label">Cooking Time (min)</label>
                                    <div class="input-group">
                                        <input name="cooking_time" type="number" class="form-control" placeholder="30" required>
                                        <span class="input-group-text bg-white">mins</span>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="recipe_image" class="form-label">Cover Photo</label>
                                    <input type="file" name="recipe_image" class="form-control" accept="image/*">
                                    <small class="text-muted">High-quality JPG or PNG works best.</small>
                                </div>

                                <div class="mb-3">
                                    <label for="recipe_description" class="form-label">Short Summary</label>
                                    <textarea class="form-control" name="recipe_description" rows="4" placeholder="Briefly describe your dish..." required></textarea>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4" style="opacity: 0.1;">

                        <div class="mb-3">
                            <label for="recipe_ingridents" class="form-label">Ingredients</label>
                            <textarea class="form-control" name="recipe_ingridents" rows="3" placeholder="List ingredients separated by commas..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label for="instructions" class="form-label">Step-by-Step Instructions</label>
                            <textarea class="form-control" name="instructions" rows="5" placeholder="1. Boil water...&#10;2. Add noodles..." required></textarea>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-8">
                                <button type="submit" class="btn btn-primary-custom w-100 shadow-sm">
                                    <i class="bi bi-plus-lg"></i> Publish Recipe
                                </button>
                            </div>
                            <div class="col-md-4">
                                <a href="/viewrecipe/" class="btn-outline-custom">
                                    View All
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
